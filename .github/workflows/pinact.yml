name: Pinact

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
      - .pinact.yaml
  pull_request:
    paths:
      - .github/workflows/**
      - .github/actions/**
      - .pinact.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinact:
    name: Verify pinned actions
    runs-on: ubuntu-slim
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check action pins
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          config: .pinact.yaml
          fix: "false"
